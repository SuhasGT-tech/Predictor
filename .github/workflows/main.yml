name: Update Copra Price Dashboard

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Only run every 2 days
        id: gate
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            DOY=$(date +%j)
            if [ $((10#$DOY % 2)) -eq 0 ]; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
          fi
          
      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Build features, train model, generate dashboard
        if: steps.gate.outputs.run == 'true'
        run: |
          python 2_fetch_external_factors.py
          python 3_build_features.py
          python 4_train_model.py
          python 5_generate_dashboard.py

      - name: Copy dashboard for GitHub Pages
        if: steps.gate.outputs.run == 'true'
        run: |
          mkdir -p docs
          cp dashboard.html docs/index.html

      - name: Commit refreshed data + dashboard
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "copra-price-bot"
          git config user.email "actions@github.com"
          git add data/ dashboard.html docs/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto-refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
